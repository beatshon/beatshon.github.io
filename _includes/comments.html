<section id="giscus-comments" style="margin-top:64px; padding-top:40px; border-top:1px solid #e8e6e3; font-family:'Noto Serif KR', Georgia, serif;">

  <h3 style="font-size:16px; letter-spacing:3px; color:#1a1a1a; margin:0 0 32px;">댓글</h3>

  <div id="comments-list" style="margin-bottom:48px;"></div>

  <form id="comment-form" style="background:#f0ede6; padding:32px; border-top:3px solid #c8b99a;">
    <h4 style="font-size:14px; letter-spacing:2px; color:#1a1a1a; margin:0 0 24px;">의견 남기기</h4>

    <input id="comment-name" type="text" placeholder="닉네임" required maxlength="30"
      style="width:100%; box-sizing:border-box; padding:12px 16px; margin-bottom:16px;
             border:1px solid #e8e6e3; background:#faf9f6; font-size:14px;
             font-family:'Noto Serif KR', serif; color:#1a1a1a; outline:none;">

    <textarea id="comment-content" placeholder="이 글을 읽고 떠오른 생각을 남겨주세요." required maxlength="500"
      rows="5"
      style="width:100%; box-sizing:border-box; padding:12px 16px; margin-bottom:8px;
             border:1px solid #e8e6e3; background:#faf9f6; font-size:14px;
             font-family:'Noto Serif KR', serif; color:#1a1a1a; resize:vertical; outline:none;"></textarea>

    <p style="font-size:12px; color:#9a9a9a; margin:0 0 20px;">댓글은 검토 후 게시됩니다.</p>

    <p id="comment-message" style="display:none; font-size:13px; margin:0 0 16px;"></p>

    <button id="comment-submit" type="submit"
      style="padding:12px 28px; background:#1a1a1a; color:#faf9f6; border:none;
             font-family:'Noto Serif KR', serif; font-size:14px; letter-spacing:2px;
             cursor:pointer; border-top:3px solid #c8b99a;">
      의견 남기기
    </button>
  </form>

</section>

<script src="{{ site.baseurl }}/assets/js/comments.js"></script>

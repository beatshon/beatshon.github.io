<!-- Disqus 댓글 (댓글이 보이려면 disqus.com에서 shortname 'beatshon' 사이트가 등록되어 있어야 합니다) -->
<div class="comments-block" style="margin: 32px 0 0; padding: 24px 60px 36px; border-top: 1px solid #eee; text-align: left;">
  <h3 style="font-size: 13px; font-weight: 600; color: #606060; margin: 0 0 16px; text-transform: uppercase; letter-spacing: 0.5px;">댓글</h3>
  <div id="disqus_thread"></div>
  <script>
    var disqus_config = function () {
      this.page.url = '{{ site.url }}{{ page.url }}';
      this.page.identifier = '{{ page.url }}';
    };
    (function() {
      var d = document, s = d.createElement('script');
      s.src = 'https://{{ site.disqus_shortname }}.disqus.com/embed.js';
      s.setAttribute('data-timestamp', +new Date());
      (d.head || d.body).appendChild(s);
    })();
  </script>
  <noscript>댓글을 보려면 JavaScript를 켜 주세요. <a href="https://disqus.com/?ref_noscript">Disqus</a>를 사용합니다.</noscript>
</div>

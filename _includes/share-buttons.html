<!-- share-buttons.html: 카카오톡(kakaotalk://), 페이스북, 링크 복사 -->
<div id="share-section" style="margin: 48px 0 32px; padding-top: 32px; border-top: 1px solid #e8e6e3; text-align: center; font-family: 'Noto Serif KR', serif;">
  <p style="font-size: 12px; color: #9a9a9a; letter-spacing: 2px; margin-bottom: 20px;">이 글이 좋았다면 공유해주세요</p>
  <div style="display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;">

    <button onclick="window.open('kakaotalk://send?text=' + encodeURIComponent(document.title + '\n' + window.location.href.split('#')[0]))"
      style="padding: 10px 20px; background: #FEE500; color: #1a1a1a;
             border: none; font-family: 'Noto Serif KR', serif; font-size: 13px;
             letter-spacing: 1px; cursor: pointer;">
      카카오톡
    </button>

    <button onclick="shareFacebook()"
      style="padding: 10px 20px; background: #1877F2; color: #fff;
             border: none; font-family: 'Noto Serif KR', serif; font-size: 13px;
             letter-spacing: 1px; cursor: pointer;">
      페이스북
    </button>

    <button onclick="copyLink()"
      style="padding: 10px 20px; background: #f0ede6; color: #1a1a1a;
             border: none; border-top: 2px solid #c8b99a; font-family: 'Noto Serif KR', serif;
             font-size: 13px; letter-spacing: 1px; cursor: pointer;"
      id="copy-btn">
      링크 복사
    </button>
  </div>
</div>

<script>
(function() {
  var pageUrl = window.location.href.split('#')[0];

  window.shareFacebook = function() {
    window.open(
      'https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(pageUrl),
      '_blank', 'width=600,height=400'
    );
  };

  window.copyLink = function() {
    var btn = document.getElementById('copy-btn');
    navigator.clipboard.writeText(pageUrl).then(function() {
      btn.textContent = '복사 완료 ✓';
      btn.style.background = '#1a1a1a';
      btn.style.color = '#faf9f6';
      setTimeout(function() {
        btn.textContent = '링크 복사';
        btn.style.background = '#f0ede6';
        btn.style.color = '#1a1a1a';
      }, 2000);
    });
  };
})();
</script>
